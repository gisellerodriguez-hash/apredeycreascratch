<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprende y crea con Scratch</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #FFF3E0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contenedor {
            width: 500px;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .encabezado {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .logo {
            width: 150px;
            height: auto;
        }

        h1 {
            color: #FF6600;
            font-size: 28px;
            margin: 0;
            text-align: center;
        }

        .gato {
            display: block;
            width: 230px;
            margin: 20px auto;
            cursor: pointer;
        }

        input {
            display: block;
            width: 90%;
            margin: 15px auto;
            padding: 12px;
            border: 2px solid #FF8C00;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
        }

        .boton {
            display: block;
            width: 200px;
            margin: 25px auto 0;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .boton:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="contenedor">

        <div class="encabezado">
            <img src="Logo 2 horizontal SANTOTO.png" alt="Logo" class="logo">
            <h1>Aprende y crea con Scratch</h1>
        </div>

        <audio id="miAudio">
            <source src="Audio Bienvenida.mp3" type="audio/mpeg">
        </audio>

        <img src="InicioGato.png"
             alt="Gato Scratch"
             class="gato"
             onclick="document.getElementById('miAudio').play()">

        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="curso" placeholder="Curso">

        <img src="boton sin fondo .png"
             alt="Comencemos"
             class="boton"
             onclick="comenzar()">

    </div>

    <script>
        function comenzar() {

            let nombre = document.getElementById("nombre").value;
            let curso = document.getElementById("curso").value;

            if (nombre === "" || curso === "") {
                alert("Por favor completa todos los campos.");
                return;
            }

            localStorage.setItem("nombre", nombre);
            localStorage.setItem("curso", curso);
            window.location.href = "MenuPrincipal.html";
        }
    </script>

</body>

</html>
