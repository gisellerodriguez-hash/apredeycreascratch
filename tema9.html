<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 9</title>

<style>

body{
    margin:0;
    background:#dcdcdc;
}

/* Botón regresar */
.regresar{
    position:fixed;
    top:20px;
    left:20px;
    width:70px;
    cursor:pointer;
    z-index:100;
}

/* Contenedor principal */
.contenedor{
    position:relative;
    width:420px;
    margin:20px auto;
}

/* Imagen central */
.actividad{
    width:100%;
    display:block;
}

/* Botones audio */
.audio-btn{
    position:absolute;
    width:40px;
    cursor:pointer;
}

/* Posiciones sobre los parlantes */

.audio1{
    top:82px;
    right:0px;
}

.audio2{
    top:172px;
    right:0px;
}

.audio3{
    top:267px;
    right:0px;
}

.audio4{
    top:378px;
    right:0px;
}

.audio5{
    top:490px;
    right:0px;
}

/* Botón Scratch */
.boton-scratch{
    display:block;
    width:220px;
    margin:20px auto 40px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- Botón regresar -->
<a href="MenuPrincipal.html">
    <img src="Regresar.png"
         class="regresar"
         alt="Regresar">
</a>

<div class="contenedor">

    <!-- Imagen principal -->
    <img src="IMG ACTIVIDAD 3.PNG"
         class="actividad"
         alt="Actividad 3">

    <!-- Botones de audio -->
    <img src="ICONO AUD.PNG"
         class="audio-btn audio1"
         onclick="reproducirAudio('audio1')">

    <img src="ICONO AUD.PNG"
         class="audio-btn audio2"
         onclick="reproducirAudio('audio2')">

    <img src="ICONO AUD.PNG"
         class="audio-btn audio3"
         onclick="reproducirAudio('audio3')">

    <img src="ICONO AUD.PNG"
         class="audio-btn audio4"
         onclick="reproducirAudio('audio4')">

    <img src="ICONO AUD.PNG"
         class="audio-btn audio5"
         onclick="reproducirAudio('audio5')">

</div>

<!-- Botón ir a Scratch -->
<a href="https://scratch.mit.edu/" target="_blank">
    <img src="Boton Ir a Scratch.PNG"
         class="boton-scratch"
         alt="Ir a Scratch">
</a>

<!-- Audios -->
<audio id="audio1">
    <source src="AUD DESCRIP ACT3.AAC" type="audio/mpeg">
</audio>

<audio id="audio2">
    <source src="PASO1 ACT3.AAC" type="audio/mpeg">
</audio>

<audio id="audio3">
    <source src="PASO2. ACT3.AAC" type="audio/mpeg">
</audio>

<audio id="audio4">
    <source src="PASO3. ACT3.AAC" type="audio/mpeg">
</audio>

<audio id="audio5">
    <source src="PASO4. ACT3.AAC" type="audio/mpeg">
</audio>

<script>
function reproducirAudio(id){

    // Detener todos los audios
    const audios = document.querySelectorAll("audio");

    audios.forEach(audio => {
        audio.pause();
        audio.currentTime = 0;
    });

    // Reproducir el seleccionado
    const audioSeleccionado =
        document.getElementById(id);

    audioSeleccionado.play()
    .catch(error => {
        console.log("Error:", error);
    });
}
</script>

</body>
</html>
