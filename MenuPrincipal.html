<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#EFE5D4;
            font-family:Arial, sans-serif;
            min-height:100vh;
        }

        /* ENCABEZADO */

        .encabezado{
            position:relative;
            text-align:center;
            padding:40px;
        }

        h1{
            color:#FF6600;
            font-size:40px;
            font-weight:bold;
        }

        /* BOTÓN REGRESAR */

        .btn-regresar{
            position:absolute;
            top:20px;
            left:20px;
            width:65px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn-regresar:hover{
            transform:scale(1.1);
        }
	
	.click{
   	 width:80px;      /* cambia el tamaño si quieres */
    	position:absolute;
   	 top:20px;
   	 right:20px;
	}

        /* CONTENEDOR PRINCIPAL */

        .estrella-container{
            position:relative;
            width:550px;
            height:550px;
            margin:40px auto;
        }

        .estrella{
            width:100%;
            height:auto;
        }

        /* ICONOS */

        .icono{
            position:absolute;
            width:120px;
            height:100px;
            cursor:pointer;
            transition:0.3s;
        }

        .icono:hover{
            transform:scale(1.15);
        }

        /* 12 PUNTAS */

        .p1{
            top:-70px;
            left:210px;
        }

        .p2{
            top:-45px;
            right:30px;
        }

        .p3{
            top:40px;
            right:-60px;
        }

        .p4{
            top:180px;
            right:-90px;
        }

        .p5{
            bottom:100px;
            right:-90px;
        }

        .p6{
            bottom:-40px;
            right:30px;
        }

        .p7{
            bottom:-70px;
            left:200px;
        }

        .p8{
            bottom:-40px;
            left:20px;
        }

        .p9{
            bottom:100px;
            left:-70px;
        }

        .p10{
            top:200px;
            left:-90px;
        }

        .p11{
            top:70px;
            left:-80px;
        }

        .p12{
            top:-35px;
            left:10px;
        }

        .mensaje{
            text-align:center;
            font-size:22px;
            color:#555;
            margin-top:20px;
        }

    </style>
</head>

<body>

    <div class="encabezado">

        <img src="Regresar.png"
             class="btn-regresar"
             alt="Regresar"
             onclick="window.location.href='index.html'">

		<img src="click.png"
     		alt="Click"
     		class="click">

        <h1>MENÚ PRINCIPAL</h1>

    </div>

    <div class="estrella-container">

        <!-- IMAGEN CENTRAL -->
        <img src="ImgFondo.png"
             alt="Scratch"
             class="estrella">

        <!-- PUNTA 1 -->
        <img src="Logo 2 horizontal SANTOTO.png"
             class="icono p1"
           

        <!-- PUNTA 2 -->
        <img src="IMG EXPL.png"
             class="icono p2"
             onclick="window.location.href='tema2.html'">

        <!-- PUNTA 3 -->
        <img src="VIDEO ENTORNO.png"
             class="icono p3"
             onclick="window.location.href='tema3.html'">

        <!-- PUNTA 4 -->
        <img src="VIDEO 1.png"
             class="icono p4"
             onclick="window.location.href='tema4.html'">

        <!-- PUNTA 5 -->
        <img src="ACT1.png"
             class="icono p5"
             onclick="window.location.href='tema5.html'">

        <!-- PUNTA 6 -->
        <img src="VIDEO 2.png"
             class="icono p6"
             onclick="window.location.href='tema6.html'">

        <!-- PUNTA 7 -->
        <img src="ACT 2.png"
             class="icono p7"
             onclick="window.location.href='tema7.html'">

        <!-- PUNTA 8 -->
        <img src="video 3.png"
             class="icono p8"
             onclick="window.location.href='tema8.html'">

        <!-- PUNTA 9 -->
        <img src="ACT 3.png"
             class="icono p9"
             onclick="window.location.href='tema9.html'">

        <!-- PUNTA 10 -->
        <img src="VIDEO 4.png"
             class="icono p10"
             onclick="window.location.href='tema10.html'">

        <!-- PUNTA 11 -->
        <img src="ACT 4.png"
             class="icono p11"
             onclick="window.location.href='tema11.html'">

        <!-- PUNTA 12 -->
        <img src="IMG EVALUACION.png"
             class="icono p12"
             onclick="window.location.href='tema12.html'">

    </div>

	<script>
	window.addEventListener("load", function () {
    const audio = document.getElementById("audioMenu");

    audio.play().catch(() => {
        document.addEventListener("click", function () {
            audio.play();
        }, { once: true });
    });
});
</script>

</body>
	<audio autoplay id="audioMenu">
    <source src="AUD 2.mp3" type="audio/mpeg">
</audio>

</html>
