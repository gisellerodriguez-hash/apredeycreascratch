<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 11</title>

<style>

<style>

body{
    margin:0;
    background:#dcdcdc;
}

/* Botón regresar */
.regresar{
    position:fixed;
    top:20px;
    left:20px;
    width:70px;
    cursor:pointer;
    z-index:100;
}

/* Contenedor responsive */
.contenedor{
    position:relative;
    width:90%;
    max-width:850px;
    margin:20px auto;
}

/* Imagen responsive */
.actividad{
    width:100%;
    height:auto;
    display:block;
}

/* Botones audio */
.audio-btn{
    position:absolute;
    width:5%;
    max-width:45px;
    min-width:28px;
    cursor:pointer;
    transition:transform 0.2s;
}

.audio-btn:hover{
    transform:scale(1.08);
}

/* POSICIONES RELATIVAS (%) */

/* Ahora escalan con la imagen */

.audioInicio{
    top: 1%;
    left: 95%;
}

.audio1{
    top:25%;
    left:40%;
}

.audio2{
    top:25%;
    left:95%;
}

.audio3{
    top:50%;
    left:40%;
}

.audio4{
    top:60%;
    left:95%;
}

/* explicación inferior */
.audio5{
    top:83%;
    left:1%;
}

/* Botón Scratch */
.boton-scratch{
    display:block;
    width:25%;
    min-width:180px;
    max-width:260px;
    margin:25px auto 50px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- Botón regresar -->
<a href="MenuPrincipal.html">
    <img src="Regresar.png"
         class="regresar"
         alt="Regresar">
</a>

<div class="contenedor">

    <!-- Imagen principal -->
    <img src="IMG ACTIVIDAD4.PNG"
         class="actividad"
         alt="Actividad 4">

    <!-- Botones de audio -->

      <img src="ICONO AUD.PNG"
         class="audio-btn audioInicio"
         onclick="reproducirAudio('audioInicio')">

    <img src="ICONO AUD.PNG"
         class="audio-btn audio1"
         onclick="reproducirAudio('audio1')">

    <img src="ICONO AUD.PNG"
         class="audio-btn audio2"
         onclick="reproducirAudio('audio2')">

    <img src="ICONO AUD.PNG"
         class="audio-btn audio3"
         onclick="reproducirAudio('audio3')">

    <img src="ICONO AUD.PNG"
         class="audio-btn audio4"
         onclick="reproducirAudio('audio4')">

    <img src="ICONO AUD.PNG"
         class="audio-btn audio5"
         onclick="reproducirAudio('audio5')">

</div>

<!-- Botón ir a Scratch -->
<a href="https://scratch.mit.edu/" target="_blank">
    <img src="imagenes/Boton Ir a Scratch.PNG"
         class="boton-scratch"
         alt="Ir a Scratch">
</a>

<!-- AUDIOS -->

<audio id="audioInicio">
    <source src="INICIO ACT4.m4a" type="audio/mpeg">
</audio>

<audio id="audio1">
    <source src="PASO 1 ACT4.m4a" type="audio/mpeg">
</audio>

<audio id="audio2">
    <source src="PASO 2 ACT4.m4a" type="audio/mpeg">
</audio>
	
<audio id="audio3">
    <source src="PASO 3 ACT4.m4a" type="audio/mpeg">
</audio>

<audio id="audio4">
    <source src="PASO 4 ACT4.m4a" type="audio/mpeg">
</audio>

<audio id="audio5">
    <source src="FINAL ACT4.m4a" type="audio/mpeg">
</audio>

<script>
function reproducirAudio(id){

    // Detener todos los audios
    const audios =
        document.querySelectorAll("audio");

    audios.forEach(audio=>{
        audio.pause();
        audio.currentTime=0;
    });

    // Reproducir el seleccionado
    const audioSeleccionado =
        document.getElementById(id);

    audioSeleccionado.play()
    .catch(error=>{
        console.log(error);
    });
}
</script>

</body>
</html>
